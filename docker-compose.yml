services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent_factory
      POSTGRES_PASSWORD: agent_factory
      POSTGRES_DB: agent_factory
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_factory"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://agent_factory:agent_factory@postgres:5432/agent_factory
      UPLOAD_DIR: /app/uploads
      GENERATED_DIR: /app/generated
      GOOGLE_SERVICE_ACCOUNT_FILE: /app/credentials/hylancerai-36f61ff30743.json
    volumes:
      - ./generated:/app/generated
      - ./uploads:/app/uploads
      - ./backend/credentials:/app/credentials:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
